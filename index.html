<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@lukefromkanto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 1rem;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .handle {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.3px;
    }

    .bio {
      font-size: 0.875rem;
      color: #666;
      margin-top: 0.4rem;
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid #ebebeb;
      margin: 1.5rem 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      border: 1.5px solid transparent;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      opacity: 0.93;
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn .icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-btn .label {
      flex: 1;
      text-align: center;
    }

    .instagram {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: #fff;
    }

    .youtube {
      background: #ff0000;
      color: #fff;
    }

    .tiktok {
      background: #111;
      color: #fff;
      border-color: #333;
    }

    .discord {
      background: #5865F2;
      color: #fff;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #bbb;
    }
  </style>
</head>
